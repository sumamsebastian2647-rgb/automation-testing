name: Smoke Tests (External Only)

on:
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd Cloudemy
          npm install

      - name: Install Playwright
        run: |
          cd Cloudemy
          npx playwright install --with-deps

      - name: Run Smoke Tests
        run: |
          cd Cloudemy
          npx playwright test --grep "@smoke"

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: Cloudemy/playwright-report/
