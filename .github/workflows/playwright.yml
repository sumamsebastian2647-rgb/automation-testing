name: Playwright Assessment Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
    
      - name: Install dependencies
        run: npm install
        working-directory: Cloudemy
    
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: Cloudemy
    
      - name: Run Assessment Tests
        run: npx playwright test tests/assessment
        working-directory: Cloudemy

