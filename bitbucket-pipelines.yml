image: mcr.microsoft.com/playwright:v1.42.1-jammy

options:
  size: 2x

definitions:
  caches:
    npm: ~/.npm

pipelines:
  branches:
    staging:
      - step:
          name: Run Smoke Tests + Trigger GitHub
          caches:
            - node
            - npm
          script:
            - npm ci
            - npx playwright test --grep "@smoke"

            # 🔥 Trigger GitHub workflow
            - curl -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/sumamsebastian2647-rgb/automation-ci/dispatches \
              -d '{"event_type":"run-smoke"}'

          artifacts:
            - playwright-report/**

    main:
      - step:
          name: Run Full Regression + Trigger GitHub
          caches:
            - node
            - npm
          script:
            - npm ci
            - npx playwright test

            # 🔥 Trigger GitHub workflow
            - curl -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/sumamsebastian2647-rgb/automation-ci/dispatches \
              -d '{"event_type":"run-smoke"}'

          artifacts:
            - playwright-report/**

  custom:
    smoke:
      - step:
          name: Manual Smoke Run + Trigger GitHub
          script:
            - npm ci
            - npx playwright test --grep "@smoke"

            - curl -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/sumamsebastian2647-rgb/automation-ci/dispatches \
              -d '{"event_type":"run-smoke"}'

    regression:
      - step:
          name: Manual Full Regression + Trigger GitHub
          script:
            - npm ci
            - npx playwright test

            - curl -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/sumamsebastian2647-rgb/automation-ci/dispatches \
              -d '{"event_type":"run-smoke"}'