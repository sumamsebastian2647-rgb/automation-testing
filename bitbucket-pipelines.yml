image: mcr.microsoft.com/playwright:v1.39.0-focal

pipelines:
  default:
    - step:
        name: Run Playwright Tests for Course_Forum_with_cohort
        caches:
          - node
        script:
          - cd Course_Forum_with_cohort
          - npm install       # or npm ci (if you have package-lock.json)
          - npx playwright install --with-deps
          - npx playwright test
        artifacts:
          - Course_Forum_with_cohort/playwright-report/**
