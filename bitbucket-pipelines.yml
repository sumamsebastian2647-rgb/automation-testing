image: mcr.microsoft.com/playwright:v1.44.0-jammy

pipelines:
  default:
    - step:
        name: Run All Tests
        caches:
          - node
        script:
          - npm install
          - npx playwright install --with-deps
          - npx playwright test --reporter=html
        artifacts:
          - playwright-report/**

  custom:
    # ---- Existing Custom Pipelines ----
    course-forum:
      - step:
          name: Test Course Forum with Cohort
          caches:
            - node
          script:
            - cd Course_Forum_with_cohort
            - npm install
            - npx playwright install --with-deps
            - npx playwright test --reporter=html
          artifacts:
            - Course_Forum_with_cohort/playwright-report/**

    new-enrollment:
      - step:
          name: Test New Enrollment
          caches:
            - node
          script:
            - cd New_enrollment
            - npm install
            - npx playwright install --with-deps
            - npx playwright test --reporter=html
          artifacts:
            - New_enrollment/playwright-report/**

     # ----  Create  Admin Tests ----
    create-admin:
      - step:
          name: Test Create Admin
          caches:
            - node
          script:
            - cd User_Management/UM_Create_Admin
            - npm install
            - npx playwright install --with-deps
            - npx playwright test tests/create_admin.spec.js --reporter=html
          artifacts:
            - User_Management/UM_Create_Admin/playwright-report/**

