image: mcr.microsoft.com/playwright:v1.44.0-jammy

pipelines:

  # ==================================================
  # 🔐 PR VALIDATION (BLOCK MERGE IF FAILS)
  # ==================================================
  pull-requests:
    '**':

      # Always protect core flows BEFORE merge
      - step:
          name: PR - New Enrollment
          caches: [node]
          script:
            - cd New_enrollment
            - npm install
            - npx playwright install --with-deps
            - npx playwright test

      - step:
          name: PR - Existing Enrollment
          caches: [node]
          script:
            - cd Existing_enrollment
            - npm install
            - npx playwright install --with-deps
            - npx playwright test


      # Conditional Modules (run only if changed)

      - step:
          name: PR - Trainer Management
          condition:
            changesets:
              includePaths:
                - "Trainer_Management/**"
          caches: [node]
          script:
            - cd Trainer_Management
            - npm install
            - npx playwright test

      - step:
          name: PR - Course Management
          condition:
            changesets:
              includePaths:
                - "Course_Management/**"
          caches: [node]
          script:
            - cd Course_Management
            - npm install
            - npx playwright test

      - step:
          name: PR - Course Induction
          condition:
            changesets:
              includePaths:
                - "Course_Induction/**"
          caches: [node]
          script:
            - cd Course_Induction
            - npm install
            - npx playwright test

      - step:
          name: PR - Custom Field Enrollment
          condition:
            changesets:
              includePaths:
                - "Custom_Field_Enrollment/**"
          caches: [node]
          script:
            - cd Custom_Field_Enrollment
            - npm install
            - npx playwright test

      - step:
          name: PR - Student Login
          condition:
            changesets:
              includePaths:
                - "Student_Login_Verify_links/**"
          caches: [node]
          script:
            - cd Student_Login_Verify_links
            - npm install
            - npx playwright test

      - step:
          name: PR - User Management
          condition:
            changesets:
              includePaths:
                - "User_Management/**"
          caches: [node]
          script:
            - cd User_Management
            - npm install
            - npx playwright test

      - step:
          name: PR - Course Forum
          condition:
            changesets:
              includePaths:
                - "Course_Forum_with_cohort/**"
          caches: [node]
          script:
            - cd Course_Forum_with_cohort
            - npm install
            - npx playwright test



  # ==================================================
  # 🟢 AFTER MERGE TO STAGING
  # ==================================================
  branches:
    staging:

      - step:
          name: Post-Merge - New Enrollment
          caches: [node]
          script:
            - cd New_enrollment
            - npm install
            - npx playwright test

      - step:
          name: Post-Merge - Existing Enrollment
          caches: [node]
          script:
            - cd Existing_enrollment
            - npm install
            - npx playwright test


    # ==================================================
    # 🔴 AFTER MERGE TO MAIN (RELEASE)
    # FULL SYSTEM VALIDATION
    # ==================================================
    main:

      - step:
          name: Release - Full Regression
          caches: [node]
          script:
            - |
              for dir in \
                Course_Forum_with_cohort \
                Course_Induction \
                Course_Management \
                Custom_Field_Enrollment \
                Existing_enrollment \
                New_enrollment \
                Student_Login_Verify_links \
                Trainer_Management \
                User_Management
              do
                echo "Running tests in $dir"
                cd $dir
                npm install
                npx playwright test
                cd ..
              done
