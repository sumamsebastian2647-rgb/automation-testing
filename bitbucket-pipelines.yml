image: mcr.microsoft.com/playwright:v1.39.0-focal

pipelines:
  default:
    - step:
        name: Run Playwright Tests for New_enrollment
        caches:
          - node
        script:
          - cd New_enrollment
          - npm install       # or npm ci (if you have package-lock.json)
          - npx playwright install --with-deps
          - npx playwright test
        artifacts:
          - New_enrollment/playwright-report/**
