    # ---- NEW: Course Induction Tests ----
    course-induction-all:
      - step:
          name: Run Course Induction Tests (All in Order)
          caches:
            - node
          script:
            - cd Course_Induction
            - npm install
            - npx playwright install --with-deps
            - echo "✅ Running Course Induction in order..."
            - npx playwright test tests/createcourse_induction.spec.js --reporter=html
            - npx playwright test tests/add_task.spec.js --reporter=html
            - npx playwright test tests/link_to_course.spec.js --reporter=html
            - npx playwright test tests/submit_induction.spec.js --reporter=html
            - npx playwright test tests/review_induction.spec.js --reporter=html
